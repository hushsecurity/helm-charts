apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: accesscredentials.am.hush.security
spec:
  group: am.hush.security
  names:
    kind: AccessCredential
    listKind: AccessCredentialList
    plural: accesscredentials
    singular: accesscredential
    shortNames:
      - acr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Status
          type: string
          jsonPath: .status.syncState
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                  description: Display name sent to the API (decoupled from metadata.name).
                type:
                  type: string
                  description: >
                    The credential type. Each type requires different fields
                    under 'config'.
                description:
                  type: string
                  description: Human-readable description of this credential.
                config:
                  type: object
                  description: >
                    Type-specific credential configuration. The controller
                    validates that required fields are present; semantic
                    validation is performed by the API service.
                  x-kubernetes-preserve-unknown-fields: true
                secretRef:
                  type: object
                  description: >
                    Reference to a Kubernetes Secret containing sensitive fields
                    (e.g. username, password, api_key, client_secret). By default, the
                    Secret keys should match the sensitive field names expected
                    by the credential type. Use keyMappings to map expected
                    field names to different keys in the Secret.
                  properties:
                    name:
                      type: string
                      description: Name of the Secret in the same namespace.
                    keyMappings:
                      type: object
                      description: >
                        Optional mapping from expected credential field names
                        to actual keys in the Secret. For example, if the
                        Secret has keys 'db_user' and 'db_pass' but the
                        credential type expects 'username' and 'password',
                        set: { username: db_user, password: db_pass }.
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                    - name
            status:
              type: object
              properties:
                syncState:
                  type: string
                  description: Current sync state of the controller.
                message:
                  type: string
                  description: Human-readable message from the controller.
                credentialId:
                  type: string
                  description: The ID assigned by the Hush platform.
                lastSyncedAt:
                  type: string
                  format: date-time
                  description: Timestamp of the last successful sync.
                observedGeneration:
                  type: integer
                  format: int64
                  description: The spec generation last reconciled by the controller.

