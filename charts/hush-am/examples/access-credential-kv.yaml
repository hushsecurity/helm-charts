apiVersion: am.hush.security/v1alpha1
kind: AccessCredential
metadata:
  name: app-secrets
spec:
  name: app-secrets
  type: kv
  description: Application key-value secrets
  config:
    items:
      - key: app_env
        value: production
      - key: log_level
        value: info
  secretRef:
    name: app-secrets-k8s
    # Optional: map expected field names to actual keys in the Secret.
    # If omitted, Secret keys must match field names exactly.
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets-k8s
type: Opaque
stringData:
  stripe_key: sk_live_xxx
  sendgrid_key: SG.xxx
