apiVersion: am.hush.security/v1alpha1
kind: AccessCredential
metadata:
  name: users-db
spec:
  name: users-db
  type: mongodb
  description: Users MongoDB credentials
  deploymentIds:
    - dep-us1234567890
  config:
    db_name: users
    host: users-mongo.internal.example.com
    port: 27017
    auth_source: admin
    tls: true
  secretRef:
    name: users-db-secret
    # Optional: map expected field names to actual keys in the Secret.
    # If omitted, Secret keys must match field names exactly (e.g. 'password').
    keyMappings:
      username: mongo_user
      password: mongo_pass
---
apiVersion: v1
kind: Secret
metadata:
  name: users-db-secret
type: Opaque
stringData:
  mongo_user: users_svc
  mongo_pass: changeme
