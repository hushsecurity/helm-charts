apiVersion: am.hush.security/v1alpha1
kind: AccessCredential
metadata:
  name: openai
spec:
  name: openai
  type: openai
  description: OpenAI API credentials
  deploymentIds:
    - dep-us1234567890
  config:
    project_id: proj_abc123
  secretRef:
    name: openai-secret
    # Optional: map expected field names to actual keys in the Secret.
    # If omitted, Secret keys must match field names exactly (e.g. 'api_key').
    keyMappings:
      api_key: openai-api-key
---
apiVersion: v1
kind: Secret
metadata:
  name: openai-secret
type: Opaque
stringData:
  openai-api-key: sk-xxx
