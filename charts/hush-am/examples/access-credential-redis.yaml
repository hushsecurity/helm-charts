apiVersion: am.hush.security/v1alpha1
kind: AccessCredential
metadata:
  name: cache
spec:
  name: cache
  type: redis
  description: Shared Redis cache
  deploymentIds:
    - dep-us1234567890
  config:
    host: redis.internal.example.com
    port: 6379
    database: 0
    tls: true
  secretRef:
    name: cache-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: cache-secret
type: Opaque
stringData:
  password: changeme
