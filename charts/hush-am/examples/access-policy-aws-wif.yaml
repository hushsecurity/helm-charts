apiVersion: am.hush.security/v1alpha1
kind: AccessPolicy
metadata:
  name: data-pipeline-s3-access
spec:
  name: data-pipeline-s3-access
  description: Grant data-pipeline access to S3 via AWS WIF
  enabled: true
  accessCredentialRef:
    name: aws-s3-credential
  accessPrivilegeRefs:
    - name: s3-read-write
  attestationCriteria:
    - type: "k8s:ns"
      value: data-pipeline
    - type: "k8s:sa"
      value: data-pipeline-worker
  deploymentIds:
    - dep-us1234567890
  deliveryConfig:
    type: aws_wif
    config:
      role_arn: "arn:aws:iam::123456789012:role/data-pipeline-role"
      subject_kind: service_account
