{{- end }}

{{/*
Mutating webhook namespaceSelector
*/}}
{{- define "hush-am.mutatingWebhookNamespaceSelector" -}}
{{- $type := .Values.admissionController.namespaceSelector.type -}}
{{- $validTypes := list "none" "names" "not_names" "custom" -}}
{{- if not (has $type $validTypes) -}}
  {{- fail (printf "'admissionController.namespaceSelector.type' must be one of %v" $validTypes) -}}
{{- end -}}
{{- if or (eq $type "names") (eq $type "not_names") -}}
{{- if not .Values.admissionController.namespaceSelector.names -}}
  {{- fail "'admissionController.namespaceSelector.names' must not be empty when type is \"names\" or \"not_names\"" -}}
{{- end -}}
{{- $names := .Values.admissionController.namespaceSelector.names -}}
{{- if eq $type "not_names" -}}
  {{- $ns := include "hush-common.namespace" . -}}
  {{- if not (has $ns $names) -}}
    {{- $names = append $names $ns -}}
  {{- end -}}
{{- end -}}
matchExpressions:
  - key: kubernetes.io/metadata.name
    operator: {{ if eq $type "names" }}In{{ else }}NotIn{{ end }}
    values: {{- $names | toYaml | nindent 6 }}
{{- else if eq $type "custom" -}}
{{- if not .Values.admissionController.namespaceSelector.custom -}}
  {{- fail "'admissionController.namespaceSelector.custom' must not be empty when type is \"custom\"" -}}
{{- end -}}
{{- .Values.admissionController.namespaceSelector.custom | toYaml -}}
{{- end -}}
{{- end }}

{{/*
Mutating webhook objectSelector
*/}}
{{- define "hush-am.mutatingWebhookObjectSelector" -}}
{{- $type := .Values.admissionController.objectSelector.type -}}
{{- $validTypes := list "none" "labels" "not_labels" "custom" -}}
{{- if not (has $type $validTypes) -}}
  {{- fail (printf "'admissionController.objectSelector.type' must be one of %v" $validTypes) -}}
{{- end -}}
{{- if eq $type "labels" -}}
{{- if not .Values.admissionController.objectSelector.labels -}}
  {{- fail "'admissionController.objectSelector.labels' must not be empty when type is \"labels\"" -}}
{{- end -}}
matchLabels: {{- .Values.admissionController.objectSelector.labels | toYaml | nindent 2 }}
{{- else if eq $type "not_labels" -}}
{{- if not .Values.admissionController.objectSelector.labels -}}
  {{- fail "'admissionController.objectSelector.labels' must not be empty when type is \"not_labels\"" -}}
{{- end -}}
matchExpressions:
{{- range $key, $_ := .Values.admissionController.objectSelector.labels }}
  - key: {{ $key }}
    operator: DoesNotExist
{{- end }}
{{- else if eq $type "custom" -}}
{{- if not .Values.admissionController.objectSelector.custom -}}
  {{- fail "'admissionController.objectSelector.custom' must not be empty when type is \"custom\"" -}}
{{- end -}}
{{- .Values.admissionController.objectSelector.custom | toYaml -}}
{{- end -}}
{{- end }}

{{/*
Silo namespace prefix
*/}}
{{- define "hush-am.siloNamespacePrefix" -}}
{{- $prefix := and .Values.secretStore .Values.secretStore.prefix -}}
{{- if not (regexMatch "^[a-z][a-z0-9]{0,9}$" $prefix) -}}
    {{- fail "'secretStore.prefix' is invalid" -}}
{{- end -}}
{{ $prefix }}
{{- end }}

{{/*
Secret store AWS region
*/}}
{{- define "hush-am.siloAwsRegion" -}}
{{- $region := and (and .Values.secretStore .Values.secretStore.aws) .Values.secretStore.aws.region -}}
{{- if not $region -}}
    {{- fail "'secretStore.aws.region' must be defined for AWS secret store" -}}
{{- end -}}
{{ $region }}
{{- end }}

{{/*
GCP Secret Manager project
*/}}
{{- define "hush-am.siloGcpProject" -}}
{{- $project := and (and .Values.secretStore .Values.secretStore.gcp) .Values.secretStore.gcp.projectId -}}
{{- if not $project -}}
    {{- fail "'secretStore.gcp.projectId' must be defined for GCP secret store" -}}
{{- end -}}
{{ $project }}
{{- end }}

{{/*
K8S Secrets Silo namespace to use
*/}}
{{- define "hush-am.kubeSiloNamespace" -}}
{{- if .Values.secretStore.k8s.namespace -}}
  {{- .Values.secretStore.k8s.namespace -}}
{{- else -}}
  {{- include "hush-common.namespace" . -}}
{{- end -}}
{{- end }}

{{/*
Is K8S Silo using self namespace to store secrets?
*/}}
{{- define "hush-am.kubeSiloUsesSelfNamespace" -}}
{{- $namespace := include "hush-common.namespace" . -}}
{{- $kubeSiloNamespace := .Values.secretStore.k8s.namespace -}}
{{- if or (not $kubeSiloNamespace) (eq $namespace $kubeSiloNamespace) -}}
true
{{- end -}}
{{- end }}

{{/*
Parse AWS Access Token parameters
*/}}
{{- define "hush-am.awsAccessToken" -}}
{{- $secretAccessKey := dig "secret_access_key" "" . -}}
{{- $accessKeyId := dig "access_key_id" "" . -}}
{{- $sessionToken := dig "session_token" "" . -}}
{{- if and $secretAccessKey $accessKeyId -}}
{{- dict
    "secret_access_key" $secretAccessKey
    "access_key_id" $accessKeyId
    "session_token" $sessionToken
    | toYaml
-}}
{{- end -}}
{{- end }}

{{/*
Secret store AWS access token
*/}}
{{- define "hush-am.siloAwsAccessToken" -}}
{{- with (dig "aws" "access_key" "" .Values.secretStore) -}}
    {{- include "hush-am.awsAccessToken" . -}}
{{- end -}}
{{- end }}

{{/*
Silo env vars
*/}}
{{- define "hush-am.siloEnvs" -}}
{{- $siloKind := and .Values.secretStore .Values.secretStore.kind -}}
{{- if eq $siloKind "awssm" -}}
- name: SILO_KIND
  value: "awssm"
- name: SILO_NAMESPACE_PREFIX
  value: {{ include "hush-am.siloNamespacePrefix" . | quote }}
- name: SILO_AWS_SM_REGION
  value: {{ include "hush-am.siloAwsRegion" . | quote }}
    {{- with (include "hush-am.siloAwsAccessToken" . | fromYaml) }}
- name: AWS_SECRET_ACCESS_KEY
  value: {{ .secret_access_key | quote }}
- name: AWS_ACCESS_KEY_ID
  value: {{ .access_key_id | quote }}
        {{- if .session_token }}
- name: AWS_SESSION_TOKEN
  value: {{ .session_token | quote }}
        {{- end }}
    {{- end }}
{{- else if eq $siloKind "awsssm" -}}
- name: SILO_KIND
  value: "awsssm"
- name: SILO_NAMESPACE_PREFIX
  value: {{ include "hush-am.siloNamespacePrefix" . | quote }}
- name: SILO_AWS_SSM_REGION
  value: {{ include "hush-am.siloAwsRegion" . | quote }}
    {{- with (include "hush-am.siloAwsAccessToken" . | fromYaml) }}
- name: AWS_SECRET_ACCESS_KEY
  value: {{ .secret_access_key | quote }}
- name: AWS_ACCESS_KEY_ID
  value: {{ .access_key_id | quote }}
        {{- if .session_token }}
- name: AWS_SESSION_TOKEN
  value: {{ .session_token | quote }}
        {{- end }}
    {{- end }}
{{- else if eq $siloKind "gcpsm" -}}
- name: SILO_KIND
  value: "gcpsm"
- name: SILO_NAMESPACE_PREFIX
  value: {{ include "hush-am.siloNamespacePrefix" . | quote }}
- name: SILO_GCP_SM_PROJECT
  value: {{ include "hush-am.siloGcpProject" . | quote }}
    {{- with (dig "gcp" "credentials_json" "" .Values.secretStore) }}
- name: SILO_GCP_SM_CREDENTIALS_JSON
  value: {{ . | quote }}
    {{- end }}
{{- else if eq $siloKind "kubesecrets" -}}
- name: SILO_KIND
  value: "kubesecrets"
- name: SILO_NAMESPACE_PREFIX
  value: {{ include "hush-am.siloNamespacePrefix" . | quote }}
- name: SILO_K8S_NAMESPACE
  value: {{ include "hush-am.kubeSiloNamespace" . | quote }}
{{- else -}}
    {{- fail (printf "invalid secret store kind: %q" $siloKind) -}}
{{- end -}}
{{- end }}

