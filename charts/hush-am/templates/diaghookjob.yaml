{{- if and .Values.diagnostics.enabled .Values.diagnostics.postInstallHook -}}
{{- $name := printf "%s-post-install" (include "hush-am.diagFullName" .) | trunc 63 -}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}
  labels: {{- include "hush-common.labels" . | nindent 4 }}
    app.kubernetes.io/component: diag
  namespace: {{ include "hush-common.namespace" . }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ add .Values.diagnostics.activeDeadlineSeconds .Values.diagnostics.postInstallDelaySeconds }}
  template:
    metadata:
      labels: {{- include "hush-common.labels" . | nindent 8 }}
        app.kubernetes.io/component: diag
    spec:
      restartPolicy: Never
      {{- with (include "hush-am.kubeImagePullSecretEffectiveList" .) }}
      imagePullSecrets: {{- . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "hush-am.accessManagerFullName" . }}
      initContainers:
        - name: vector
          image: {{ include "hush-am.accessManagerVectorImagePath" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          restartPolicy: Always
          volumeMounts:
            - name: vector-socket-dir
              mountPath: /tmp/vector
            - name: {{ include "hush-common.k8sSecretsProjectionVolumeName" . }}
              mountPath: {{ include "hush-common.k8sSecretsProjectionVolumePath" . }}
              readOnly: true
          env:
            {{- include "hush-am.mandatoryEnvs" . | nindent 12 }}
            {{- with (include "hush-am.effectiveDeploymentPasswordKubeSecretRef" . | fromYaml) }}
            - name: DEPLOYMENT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .name }}
                  key: {{ .key }}
            {{- end }}
            - name: REPORT_SUBSYSTEM_NAME
              value: "mufasa-diag"
            - name: REPORT_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- with .Values.eventReportingConsole }}
            - name: EVENT_REPORTING_CONSOLE
              value: {{ . | quote }}
            {{- end }}
            - name: HELM_RELEASE
              value: {{ .Release.Name }}
            - name: HELM_NAMESPACE
              value: {{ include "hush-common.namespace" . }}
            - name: HELM_CHART_VERSION
              value: {{ .Chart.Version | quote }}
      containers:
        - name: diag
          image: {{ include "hush-am.diagImagePath" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              sleep {{ .Values.diagnostics.postInstallDelaySeconds }}
              exec /diag --report --json --timeout={{ .Values.diagnostics.perCheckTimeout }}
          resources:
            {{- toYaml .Values.diagnostics.resources | nindent 12 }}
          volumeMounts:
            - name: vector-socket-dir
              mountPath: /tmp/vector
            - name: spire-agent-socket-dir
              mountPath: {{ include "hush-am.spireAgentSocketDirMountPath" . }}
            - name: {{ include "hush-common.k8sSecretsProjectionVolumeName" . }}
              mountPath: {{ include "hush-common.k8sSecretsProjectionVolumePath" . }}
              readOnly: true
            {{- if .Values.diagnostics.logConfig }}
            - name: diag-log-config
              mountPath: /opt/mufasa
              readOnly: true
            {{- end }}
          env:
            {{- include "hush-am.accessManagerEnvs" . | nindent 12 }}
            - name: MUFASA_DIAG_PORT_ADDRESS
              value: {{ include "hush-am.accessManagerRestAddress" . | quote }}
            - name: MUFASA_DIAG_APP_LABEL
              value: {{ include "hush-common.name" . | quote }}
            {{- with .Values.spire }}{{- with .trustDomain }}
            - name: MUFASA_SPIRE_TRUST_DOMAIN
              value: {{ . | quote }}
            {{- end }}{{- end }}
      volumes:
        - name: vector-socket-dir
          emptyDir:
            sizeLimit: 1Mi
        - name: spire-agent-socket-dir
          hostPath:
            path: {{ .Values.spireAgent.hostDir }}
            type: DirectoryOrCreate
        - name: {{ include "hush-common.k8sSecretsProjectionVolumeName" . }}
          projected:
            sources:
              - serviceAccountToken:
                  path: {{ include "hush-common.k8sSaTokenFileName" . }}
        {{- if .Values.diagnostics.logConfig }}
        - name: diag-log-config
          configMap:
            name: {{ include "hush-am.configMapName" . }}
            items:
              - key: diag_log_config
                path: log_config.yaml
        {{- end }}
{{- end }}
