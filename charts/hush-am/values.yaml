# Default values for hush-am.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This is to override the chart name.
nameOverride: ""

# This is to override the chart fullname.
fullnameOverride: ""

# Override the namespace used for all objects.
# If not specified '.Release.Namespace' is used.
namespaceOverride: ""

# Labels applied to all resources.
# For more information see
# https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
commonLabels: {}

# Mode of event logging:
# - "yes"       - log everything (may be high volume)
# - "no"        - log nothing
# - "heartbeat" - log heartbeat events only (low volume)
eventReportingConsole: "heartbeat"

# The cluster domain.
clusterDomain: cluster.local

# Hush deployment configuration
hushDeployment:
  # Authentication mode for Hush API token exchange.
  # Allowed values:
  # - credentials - use deployment password (default)
  authMode: "credentials"

  # The deployment token as received from API/UI.
  token: ""

  # The deployment password as received from API/UI.
  password: ""

  # A reference to an existing Secret with deployment password and token.
  #
  # The secret must be defined in the same namespace where the chart is installed.
  #
  # If deployment token is stored this way updating its value in the Secret
  # must be followed by chart recompilation (helm upgrade/template) or
  # fresh installation (helm install).
  secretKeyRef:
    # Secret name
    name: ""

    # Password secret key
    #
    # If 'hushDeployment.password' is defined this value is ignored.
    key: ""

    # Token secret key
    #
    # If 'hushDeployment.token' is defined this value is ignored.
    tokenKey: ""

  # Name of K8S Secret created by hush-sensor deployment
  sensorDeploymentSecretName: hush-sensor-deploymentsecret

# Values related to Hush Security container images
image:
  # Image pull token contains registry information and credentials
  pullToken: ""

  # Container registry to pull images from
  #
  # This value is ignored when 'image.pullToken' is defined.
  registry: hushsecurity.azurecr.io

  # Container registry with anonymous read access
  anonymousRegistry: hushsecuritypub.azurecr.io

  # Overrides the image tag for access management images.
  #
  # When not defined '.Chart.appVersion' is used. Ensure compatibility when overriding.
  tag: ""

  # Custom tag for AM Injector image
  #
  # When not defined the runtime version of admission controller is used.
  injectorTag: ""

  # Image repository for Access Manager container
  accessManagerRepository: am-access-manager

  # Image repository for Access Manager Vector container
  accessManagerVectorRepository: am-access-manager-vector

  # Image repository for Access Management Spire Server container
  spireServerRepository: am-spire-server

  # Image repository for Access Management Spire Agent container
  spireAgentRepository: am-spire-agent

  # Image repository for Admission Controller container
  admissionControllerRepository: am-admission-controller

  # Image repository for API Controller container
  apiControllerRepository: am-api-controller

  # Image repository for Access Management Injector container
  injectorRepository: am-injector

  # A list of pre-created image pull secrets of the form:
  #
  # pullSecretList:
  #   - name: "<secret-name-here>"
  #
  # Secrets must be pre-created in the same namespace where the chart is installed.
  #
  # When this list is empty 'image.pullSecret' can be used to create a secret
  # automatically.
  #
  # More information can be found here:
  # https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  pullSecretList: []

  # Creates a Secret for pulling images
  #
  # When 'image.pullToken' is defined the credentials for the Secret are taken
  # from there. Otherwise both 'username' and 'password' must be defined.
  #
  # When 'image.pullSecretList' is non-empty the created secret is not used.
  pullSecret:
    # Custom pull secret name.
    # When not defined chart's full name is used with '-imagepullsecret' suffix.
    name: ""

    # Pull secret username
    #
    # This value is ignored when 'image.pullToken' is defined.
    username: ""

    # Pull secret password
    #
    # This value is ignored when 'image.pullToken' is defined.
    password: ""

  # Name of image pull secret created by hush-sensor chart
  sensorImagePullSecretName: hush-sensor-imagepullsecret

  # The pull policy for images.
  pullPolicy: Always

  # Custom pull policy for Access Management injector
  injectorPullPolicy: ""

# Secret store configuration
secretStore:
  # The secret store kind
  # Allowed values are:
  # - awssm: AWS Secrets Manager
  # - awsssm: AWS SSM Parameter Store
  # - gcpsm: GCP Secret Manager
  # - kubesecrets: K8S Secrets
  kind: "kubesecrets"

  # A prefix used to distinguish secrets created by hush-am platform
  prefix: "hush"

  # AWS secret store configuration (used by awssm and awsssm)
  aws:
    # AWS IAM role ARN to configure with irsa annotations
    # This value must be equal to 'containerRegistry.aws.irsa' if both are defined.
    #
    # For more information see:
    # https://docs.aws.amazon.com/eks/latest/userguide/iam-roles-for-service-accounts.html
    # DEPRECATED: use 'accessManager.workloadIdentity.aws.irsa' instead.
    irsa: ""

    # AWS access key (not recommended in production environments; used for testing)
    access_key:
      # AWS_SECRET_ACCESS_KEY value
      secret_access_key: ""
      # AWS_ACCESS_KEY_ID value
      access_key_id: ""
      # AWS_SESSION_TOKEN value (for temporary credentials)
      session_token: ""

    # AWS region name, e.g. "us-east-1"
    region: ""

  # GCP secret store configuration
  gcp:
    # GCP project ID
    projectId: ""

    # GCP service account key JSON (not recommended in production environments; used for testing)
    #
    # For more information see:
    # https://cloud.google.com/iam/docs/keys-create-delete
    credentials_json: ""

  # Kubernetes secret store configuration
  k8s:
    # K8S namespace to store secrets in
    # If not specified, the namespace where the chart is installed is used.
    namespace: ""

# Container registry configuration.
# This affects the way Hush Access Management platform accesses workload container images'
# manifest to update injector command accordingly
containerRegistry:
  # Default container registry to use for images without explicit registry.
  # When empty 'docker.io' is used.
  default: ""

  # AWS ECR configuration
  aws:
    # AWS IAM role ARN to configure with irsa annotations
    # This value must be equal to 'secretStore.aws.irsa' if both are defined.
    #
    # The role should give read access to ECR repositories from which workload images
    # are pulled.
    #
    # For more information see:
    # https://docs.aws.amazon.com/eks/latest/userguide/iam-roles-for-service-accounts.html
    # DEPRECATED: use 'accessManager.workloadIdentity.aws.irsa' instead.
    irsa: ""

  # GCP configuration
  gcp:
    # GCP IAM Service Account to use for Workload Identity annotation
    #
    # For more information see:
    # https://docs.cloud.google.com/kubernetes-engine/docs/how-to/workload-identity#kubernetes-sa-to-iam
    # DEPRECATED: use 'accessManager.workloadIdentity.gcp.sa' instead.
    sa: ""

  # Azure configuration
  azure:
    # Azure Workload Identity Client ID to use for Service Account annotation
    #
    # For more information see:
    # https://learn.microsoft.com/en-us/azure/aks/workload-identity-overview
    # DEPRECATED: use 'accessManager.workloadIdentity.azure.clientId' instead.
    clientId: ""

# Values for Access Manager
accessManager:
  # Kind of workload to use for access manager
  #
  # Allowed values:
  # - deployment
  # - statefulset
  #
  # Description:
  # 'deployment' mode uses K8S Deployment workload type for the manager, and
  # ephemeral 'emptyDir' storage for its data.
  #
  # 'statefulset' mode uses K8S StatefulSet workload type for the manager, and
  # Persistent Volume Claim (PVC) for its data.
  kind: deployment

  # Listening port for REST API
  port: 8743

  # Number of manager replicas
  replicas: 2

  # Readiness probe parameters for access-manager.
  # Changes must be coordinated with Hush support team.
  readinessProbe:
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 2
    successThreshold: 1
    initialDelaySeconds: 5

  # Liveness probe parameters for access-manager.
  # Changes must be coordinated with Hush support team.
  livenessProbe:
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 4
    initialDelaySeconds: 300

  # Startup probe parameters for access-manager.
  # Changes must be coordinated with Hush support team.
  startupProbe:
    periodSeconds: 10
    failureThreshold: 30

  # Priority value for dedicated priority class
  priority: 1000000000

  # Custom priority class to use.
  #
  # When not specified a dedicated priority class is used with 'accessManager.priority' value.
  priorityClassName: ""

  # Custom node selector
  nodeSelector: {}

  # Termination grace period
  terminationGracePeriodSeconds: 30

  # Additional annotations.
  # For more information see
  # https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  annotations: {}

  # Node affinity.
  # Choose the node types by OS and Arch.
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                  - linux
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
                  - arm64

  # A list of tolerations.
  # For more information see
  # https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
  tolerations: []

  # Topology spread constraints configuration.
  #
  # For more information see
  # https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/
  topologySpreadConstraints:
    # Constraints type.
    #
    # Allowed values:
    # - "none"        - no topology spread constraints
    # - "zones"       - spread across zones
    # - "zones_nodes" - spread across zones and nodes
    # - "custom"      - use custom 'topologySpreadConstraints.custom' value
    type: "none"

    # Policy when topology spread constraint is not satisfiable.
    # Used with builtin types ("zones", "zones_nodes").
    #
    # Allowed values:
    # - "ScheduleAnyway" - schedule anyway, minimizing skew
    # - "DoNotSchedule"  - do not schedule the pod
    whenUnsatisfiable: "ScheduleAnyway"

    # Custom topology spread constraints.
    # Only used when 'type' is "custom".
    custom: []

  # Data volume claim configuration.
  # This is ignored when 'manager.kind' is 'deployment'.
  dataVolumeClaim:
    # Size of the volume claim
    size: 8Gi

    # Access modes for the volume claim
    accessModes:
      - ReadWriteOnce

    # Storage class name
    #
    # When not specified the default storage class is used.
    storageClassName: ""

    # A label query over volumes to consider for binding.
    #
    # Example:
    #
    # matchLabels:
    #   name: my-volume
    #
    # For more information see
    # https://kubernetes.io/docs/reference/kubernetes-api/config-and-storage-resources/persistent-volume-claim-v1/#PersistentVolumeClaimSpec
    selector: {}

    # The binding reference to the PersistentVolume backing PV claim.
    volumeName: ""

  # Default resource requests/limits for access manager
  #
  # Adjusted to cover most cases. Change based on your needs.
  resources:
    limits:
      cpu: "400m"
      memory: "512Mi"
      ephemeral-storage: "1Gi"
    requests:
      cpu: "100m"
      memory: "128Mi"
      ephemeral-storage: "128Mi"

  # Default resource requests/limits for spire-server
  # DEPRECATED: use 'spireServer.resources' instead.
  spireServerResources:
    limits:
      cpu: "400m"
      memory: "512Mi"
      ephemeral-storage: "1Gi"
    requests:
      cpu: "100m"
      memory: "128Mi"
      ephemeral-storage: "128Mi"

  # Default resource requests/limits for manager-vector
  #
  # Adjusted to cover most cases. Change based on your needs.
  vectorResources:
    limits:
      cpu: "300m"
      memory: "256Mi"
      ephemeral-storage: "512Mi"
    requests:
      cpu: "30m"
      memory: "64Mi"
      ephemeral-storage: "128Mi"

  # Custom log configuration for Access Manager
  #
  # Example:
  # logConfig:
  #   default_level: info
  #   default_export: true
  #   default_export_level: warn
  #   loggers: []
  logConfig: {}

  # Workload Identity configuration for the access manager service account.
  workloadIdentity:
    # AWS configuration
    aws:
      # AWS IAM role ARN to configure with irsa annotations
      # This value must be equal to 'secretStore.aws.irsa' if both are defined.
      # This value must be equal to 'containerRegistry.aws.irsa' if both are defined.
      #
      # For more information see:
      # https://docs.aws.amazon.com/eks/latest/userguide/iam-roles-for-service-accounts.html
      irsa: ""

    # GCP configuration
    gcp:
      # GCP IAM Service Account to use for Workload Identity annotation
      # This value must be equal to 'containerRegistry.gcp.sa' if both are defined.
      #
      # For more information see:
      # https://docs.cloud.google.com/kubernetes-engine/docs/how-to/workload-identity#kubernetes-sa-to-iam
      sa: ""

    # Azure configuration
    azure:
      # Azure Workload Identity Client ID to use for Service Account annotation
      #
      # For more information see:
      # https://learn.microsoft.com/en-us/azure/aks/workload-identity-overview
      clientId: ""

# Values for Spire Agent DaemonSet
spireAgent:
  # Host directory for Spire Agent socket
  hostDir: "/var/lib/hush-security/am-spire-agent"

  # Skip kubelet certificate verification
  skipKubeletVerification: true

  # Host directory where kubelet certificate is located
  kubeletCertDir: "/var/lib/kubelet/pki"

  # Name of the kubelet certificate file within 'kubeletCertDir'
  # Common values:
  # AWS EKS  = kubelet-server-current.pem
  # minikube = kubelet.crt
  kubeletCertFile: "kubelet-server-current.pem"

  # Readiness probe parameters for spire-agent.
  # Changes must be coordinated with Hush support team.
  readinessProbe:
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 2

  # Liveness probe parameters for spire-agent.
  # Changes must be coordinated with Hush support team.
  livenessProbe:
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 4

  # Startup probe parameters for spire-agent.
  # Changes must be coordinated with Hush support team.
  startupProbe:
    periodSeconds: 10
    failureThreshold: 30

  # Additional annotations.
  # For more information see
  # https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  annotations: {}

  # Priority value for dedicated priority class
  priority: 1000000000

  # Custom priority class to use.
  #
  # When not specified a dedicated priority class is used with 'spireAgent.priority' value.
  priorityClassName: ""

  # Custom node selector
  nodeSelector: {}

  # Termination grace period
  terminationGracePeriodSeconds: 30

  # Node affinity.
  # Choose the node types by OS and Arch.
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                  - linux
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
                  - arm64
              - key: type
                operator: NotIn
                values:
                  - virtual-kubelet
              - key: eks.amazonaws.com/compute-type
                operator: NotIn
                values:
                  - fargate

  # Custom log level for Spire Agent
  #
  # Allowed values: DEBUG|INFO|WARN|ERROR
  logLevel: ""

  # A list of tolerations.
  # For more information see
  # https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
  tolerations:
    - operator: "Exists"

  # Default resource requests/limits for spire-agent
  #
  # Adjusted to cover most cases. Change based on your needs.
  resources:
    limits:
      cpu: "350m"
      memory: "384Mi"
      ephemeral-storage: "1Gi"
    requests:
      cpu: "50m"
      memory: "128Mi"
      ephemeral-storage: "128Mi"

# Values for Spire Server
spireServer:
  # Listening port for Spire Server
  port: 8781

  # Custom log level for Spire Server
  #
  # Allowed values: DEBUG|INFO|WARN|ERROR
  logLevel: ""

  # Default resource requests/limits for spire-server
  #
  # Adjusted to cover most cases. Change based on your needs.
  resources:
    limits:
      cpu: "400m"
      memory: "512Mi"
      ephemeral-storage: "1Gi"
    requests:
      cpu: "100m"
      memory: "128Mi"
      ephemeral-storage: "128Mi"

  # Readiness probe parameters for spire-server.
  # Changes must be coordinated with Hush support team.
  readinessProbe:
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 2

  # Liveness probe parameters for spire-server.
  # Changes must be coordinated with Hush support team.
  livenessProbe:
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 4

  # Startup probe parameters for spire-server.
  # Changes must be coordinated with Hush support team.
  startupProbe:
    periodSeconds: 10
    failureThreshold: 30

# Values for Admission Controller
admissionController:
  # Mutating Webhook timeout in seconds
  mutatingWebhookTimeout: 30

  # Mutating webhook namespace selector configuration.
  #
  # For more information see
  # https://kubernetes.io/docs/reference/access-authn-authz/extensible-admission-controllers/#matching-requests-namespaceselector
  namespaceSelector:
    # Selector type.
    #
    # Allowed values:
    # - "none"      - no namespaceSelector (webhook applies to all namespaces)
    # - "names"     - match namespaces by name (In operator)
    # - "not_names" - match namespaces not in the list (NotIn operator)
    # - "custom"    - use a full custom labelSelector
    type: "not_names"

    # List of namespace names.
    # Used when type is "names" or "not_names".
    names:
      - kube-system
      - kube-public
      - kube-node-lease

    # Custom labelSelector object.
    # Used when type is "custom".
    #
    # Example:
    # custom:
    #   matchLabels:
    #     environment: production
    custom: {}

  # Mutating webhook object selector configuration.
  #
  # For more information see
  # https://kubernetes.io/docs/reference/access-authn-authz/extensible-admission-controllers/#matching-requests-objectselector
  objectSelector:
    # Selector type.
    #
    # Allowed values:
    # - "none"       - no objectSelector (webhook applies to all objects)
    # - "labels"     - match objects by label key=value pairs (matchLabels)
    # - "not_labels" - match objects without the specified label keys (DoesNotExist)
    # - "custom"     - use a full custom labelSelector
    type: "none"

    # Label key=value pairs.
    # Used when type is "labels" (rendered as matchLabels).
    # Used when type is "not_labels" (rendered as matchExpressions DoesNotExist, only keys used).
    labels: {}

    # Custom labelSelector object.
    # Used when type is "custom".
    #
    # Example:
    # custom:
    #   matchExpressions:
    #     - key: hush.security/inject
    #       operator: NotIn
    #       values:
    #         - "false"
    custom: {}

  # Listening port for Admission Controller webhook
  port: 12443

  # Enable hushinjector verbose mode
  verboseInjector: false

  # Default resource requests/limits for Admission Controller
  #
  # Adjusted to cover most cases. Change based on your needs.
  resources:
    limits:
      cpu: "300m"
      memory: "384Mi"
      ephemeral-storage: "1Gi"
    requests:
      cpu: "50m"
      memory: "128Mi"
      ephemeral-storage: "128Mi"

  # Readiness probe parameters for admission-controller.
  # Changes must be coordinated with Hush support team.
  readinessProbe:
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 1
    successThreshold: 1

  # Liveness probe parameters for admission-controller.
  # Changes must be coordinated with Hush support team.
  livenessProbe:
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # Startup probe parameters for admission-controller.
  # Changes must be coordinated with Hush support team.
  startupProbe:
    periodSeconds: 10
    failureThreshold: 30

  # Custom log configuration for Admission Controller
  #
  # Example:
  # logConfig:
  #   default_level: info
  #   default_export: true
  #   default_export_level: warn
  #   loggers: []
  logConfig: {}

# Values for API Controller
apiController:
  # Enable the API controller deployment
  enabled: true

  # Number of replicas
  replicas: 1

  # Resource requests/limits for the API controller container
  #
  # Adjusted to cover most cases. Change based on your needs.
  resources:
    limits:
      cpu: "330m"
      memory: "256Mi"
      ephemeral-storage: "512Mi"
    requests:
      cpu: "30m"
      memory: "64Mi"
      ephemeral-storage: "128Mi"

  # Resource requests/limits for the vector sidecar
  #
  # Adjusted to cover most cases. Change based on your needs.
  vectorResources:
    limits:
      cpu: "200m"
      memory: "256Mi"
      ephemeral-storage: "512Mi"
    requests:
      cpu: "20m"
      memory: "64Mi"
      ephemeral-storage: "128Mi"
