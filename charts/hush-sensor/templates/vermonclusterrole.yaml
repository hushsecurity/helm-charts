{{- if .Values.vermon.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "hush-sensor.vermonFullName" . }}
  labels: {{- include "hush-common.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
{{- end -}}
